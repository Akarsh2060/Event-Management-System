<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zevents | User Management</title>

    <link rel="icon" href="/static/images/zevntt.png">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --purple:#9b5cff;
            --purple-soft:#b388ff;
            --bg-dark:#120f1b;
            --card-bg:rgba(255,255,255,0.08);
            --border-glass:rgba(255,255,255,0.15);
            --text-main:#ecebff;
            --text-muted:#a6a4c9;
        }

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            background:radial-gradient(circle at top left,#2a1f44,#120f1b);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            color:var(--text-main);
        }

        /* ---------- GLASS CARD ---------- */
        .glass-card{
            background:var(--card-bg);
            backdrop-filter:blur(16px);
            border-radius:20px;
            border:1px solid var(--border-glass);
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
            padding:30px;
            width:100%;
            max-width:800px;
            animation:fadeUp .6s ease;
        }

        @keyframes fadeUp{
            from{opacity:0;transform:translateY(20px);}
            to{opacity:1;transform:translateY(0);}
        }

        /* ---------- TITLE ---------- */
        .title{
            font-size:26px;
            font-weight:600;
            color:var(--purple-soft);
            margin-bottom:25px;
            position:relative;
        }

        .title::after{
            content:"";
            position:absolute;
            bottom:-6px;
            left:0;
            width:40px;
            height:3px;
            background:linear-gradient(135deg,var(--purple),#6a3cff);
            border-radius:5px;
        }

        /* ---------- FORM ---------- */
        .input-box{
            margin-bottom:20px;
        }

        .input-box span{
            display:block;
            margin-bottom:6px;
            font-size:14px;
            color:var(--text-muted);
        }

        .input-box input{
            width:100%;
            height:45px;
            border-radius:12px;
            border:1px solid var(--border-glass);
            background:rgba(255,255,255,0.08);
            color:var(--text-main);
            padding:0 15px;
            outline:none;
            transition:.3s;
        }

        .input-box input:focus{
            border-color:var(--purple);
            box-shadow:0 0 0 2px rgba(155,92,255,0.25);
        }

        /* ---------- BUTTONS ---------- */
        .btn-primary-custom{
            background:linear-gradient(135deg,var(--purple),#6a3cff);
            border:none;
            border-radius:100px;
            color:#fff;
            padding:10px 30px;
            transition:.3s;
        }

        .btn-primary-custom:hover{
            transform:translateY(-2px);
            box-shadow:0 0 25px rgba(155,92,255,0.6);
            color:#fff;
        }

        .btn-danger-custom{
            background:linear-gradient(135deg,#ff4d4d,#c91818);
            border:none;
            border-radius:100px;
            color:#fff;
            padding:8px 22px;
            transition:.3s;
        }

        .btn-danger-custom:hover{
            box-shadow:0 0 20px rgba(255,77,77,0.6);
            color:#fff;
        }

        /* ---------- TABLE ---------- */
        .table{
            color:var(--text-main);
            margin-top:10px;
        }

        .table thead{
            background:rgba(155,92,255,0.25);
        }

        .table th{
            border:none;
            font-weight:500;
        }

        .table td{
            border-top:1px solid var(--border-glass);
            vertical-align:middle;
        }

        .table-hover tbody tr:hover{
            background:rgba(155,92,255,0.12);
        }

        a.action-link{
            color:var(--purple-soft);
            font-weight:500;
            margin:0 5px;
        }

        a.action-link:hover{
            color:#fff;
            text-decoration:none;
        }

        @media(max-width:768px){
            .glass-card{
                padding:20px;
            }
        }
        .back-btn{
    position:absolute;
    top:22px;
    left:22px;
    padding:8px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:500;
    letter-spacing:.3px;
    color:#c4b5fd;
    background:rgba(18,15,27,.65);
    border:1px solid rgba(155,92,255,.35);
    backdrop-filter:blur(10px);
    box-shadow:0 8px 25px rgba(0,0,0,.45);
    transition:.25s ease;
    z-index:100;

    /* 🔑 underline fix */
    text-decoration:none;
}

.back-btn:hover,
.back-btn:focus,
.back-btn:active{
    text-decoration:none;   /* double-safe */
    color:#fff;
    background:rgba(155,92,255,.25);
    box-shadow:0 12px 35px rgba(155,92,255,.55);
    transform:translateY(-1px);
}
    </style>
</head>

<body>
<a href="javascript:history.back()" class="back-btn">
    ← Back
</a>

{% if key1 %}
<div class="glass-card">
    <div class="title">Update User</div>

    <form method="POST">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 input-box">
                <span>User Name</span>
                <input type="text" name="uname" value="{{key1.uname}}" required>
            </div>

            <div class="col-md-6 input-box">
                <span>Email</span>
                <input type="email" name="email" value="{{key1.email}}" required>
            </div>

            <div class="col-md-6 input-box">
                <span>Phone Number</span>
                <input type="number" name="phone" value="{{key1.phone}}" required>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn-primary-custom">Save Changes</button>
            <button type="button" class="btn-danger-custom ml-3" onclick="history.back()">Back</button>
        </div>
    </form>
</div>
{% endif %}

{% if key2 %}
<div class="glass-card" style="max-width:1100px;">
    <div class="title">User List</div>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>User Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th style="width:160px;">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for i in key2 %}
            <tr>
                <td>{{i.uname}}</td>
                <td>{{i.email}}</td>
                <td>{{i.phone}}</td>
                <td>
                    <a href="/update/{{i.id}}" class="action-link">Update</a> |
                    <a href="/delete/{{i.id}}" class="action-link">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="text-right mt-4">
        <a href="/adminPage/" class="btn-primary-custom">Home</a>
    </div>
</div>
{% endif %}

</body>
</html>
