<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zevents | Login</title>
<link rel="icon" href="/static/images/zevntt.png">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#a855f7;
  --secondary:#7c3aed;
  --dark:#070411;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

a{
  text-decoration:none;
  color:inherit;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#3b1b6f,transparent 50%),
    radial-gradient(circle at bottom right,#1b0f3a,transparent 50%),
    var(--dark);
  color:white;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* floating bubbles */

.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(168,85,247,0.18);
  opacity:.7;
  animation:drift linear infinite;
}

.b1{width:240px;height:240px;left:-300px;top:15%;animation-duration:32s;}
.b2{width:160px;height:160px;left:-200px;top:55%;animation-duration:26s;}
.b3{width:200px;height:200px;left:-250px;bottom:10%;animation-duration:38s;}

@keyframes drift{
from{transform:translateX(0)}
to{transform:translateX(160vw)}
}

/* login card */

.login-container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:40px 35px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

.login-container h1{
  text-align:center;
  font-size:28px;
  margin-bottom:10px;
}

.login-container p.subtitle{
  text-align:center;
  font-size:13px;
  opacity:.8;
  margin-bottom:30px;
}

/* inputs */

.login-container input{
  width:100%;
  padding:14px 16px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

.login-container input::placeholder{
  color:rgba(255,255,255,0.6);
}

.login-container input:focus{
  border-color:var(--primary);
}

/* button */

.login-container button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  font-weight:600;
  cursor:pointer;
}

.login-container button:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 40px rgba(168,85,247,0.5);
}

/* links */

.login-links{
  text-align:center;
  margin-top:22px;
  font-size:13px;
  opacity:.85;
}

.login-links a{
  color:var(--primary);
}

/* forgot password */

.forgot-link{
  color:white;
}

.forgot-link:hover{
  color:var(--primary);
}

/* password eye */

.eye-toggle{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(calc(-50% - 7px));
  cursor:pointer;
}

/* popup modal */

.popup-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup-box{
  width:320px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(15px);
  border-radius:14px;
  padding:28px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.popup-box h3{
  margin-bottom:12px;
}

.popup-box button{
  margin-top:18px;
  padding:10px 22px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  cursor:pointer;
}

@media(max-width:480px){
.login-container{margin:20px;}
}

</style>
</head>

<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>

<div class="login-container">

<h1>Welcome Back</h1>
<p class="subtitle">Login to manage your events</p>

<form method="POST" action="{% url 'login' %}">
{% csrf_token %}

<input
type="text"
name="identifier"
placeholder="Phone number or Email"
required
>

<div style="position:relative;">

<input
type="password"
name="password"
id="login_password"
placeholder="Password"
required
style="padding-right:45px;"
>

<span class="eye-toggle" onclick="togglePassword()">

<svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24">
<path stroke="white" stroke-width="2" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>
<circle cx="12" cy="12" r="3" stroke="white" stroke-width="2"/>
</svg>

<svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" style="display:none;">
<line x1="1" y1="1" x2="23" y2="23" stroke="white" stroke-width="2"/>
</svg>

</span>

</div>

<button type="submit">Login</button>

<div style="text-align:right;margin-top:8px;font-size:12px;">
<a href="{% url 'forget_password' %}" class="forgot-link">Forgot password?</a>
</div>

<button
type="button"
onclick="window.location.href='/login-otp/'"
style="margin-top:14px;background:transparent;border:1px solid rgba(255,255,255,0.3);box-shadow:none;">
Login with OTP
</button>

</form>

<div class="login-links">
<p>Don’t have an account? <a href="/register/">Create one</a></p>
<p style="margin-top:8px;"><a href="/">← Back to Home</a></p>
</div>

</div>

{% if message %}
<div class="popup-overlay" id="popup">
<div class="popup-box">

<h3>Login Error</h3>
<p>{{ message }}</p>

<button onclick="closePopup()">OK</button>

</div>
</div>
{% endif %}

<script>

function togglePassword(){

const pwd=document.getElementById("login_password");
const eyeOpen=document.getElementById("eyeOpen");
const eyeClosed=document.getElementById("eyeClosed");

if(pwd.type==="password"){
pwd.type="text";
eyeOpen.style.display="none";
eyeClosed.style.display="block";
}else{
pwd.type="password";
eyeOpen.style.display="block";
eyeClosed.style.display="none";
}

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

if(window.history.replaceState){
window.history.replaceState(null,null,window.location.href);
}

</script>

</body>
</html>
