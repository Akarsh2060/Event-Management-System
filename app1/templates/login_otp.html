<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zevents | Login with OTP</title>
<link rel="icon" href="/static/images/zevntt.png">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#a855f7;
  --secondary:#7c3aed;
  --dark:#070411;
  --card:#0d0a1a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#3b1b6f,transparent 50%),
    radial-gradient(circle at bottom right,#1b0f3a,transparent 50%),
    var(--dark);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:#fff;
}

/* ===== Floating bubbles ===== */
.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(168,85,247,.18);
  animation:drift linear infinite;
}
.b1{width:240px;height:240px;left:-300px;top:15%;animation-duration:32s;}
.b2{width:160px;height:160px;left:-200px;top:55%;animation-duration:26s;}
.b3{width:200px;height:200px;left:-250px;bottom:10%;animation-duration:38s;}

@keyframes drift{
  to{transform:translateX(160vw) translateY(-80px);}
}

/* ===== Card ===== */
.card{
  width:100%;
  max-width:380px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:36px 32px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  position:relative;
  z-index:2;
}

.back{
  font-size:13px;
  color:#c4b5fd;
  cursor:pointer;
  margin-bottom:14px;
  display:inline-block;
}
.change {
    margin-left: 200px;
    font-size:13px;
  color:#ae41f7;
  cursor:pointer;
  display:inline-block;
}

h2{
  font-size:22px;
  margin-bottom:18px;
}

/* ===== Inputs ===== */
input{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);
  color:#fff;
  margin-bottom:14px;
}

button{
  width:100%;
  padding:14px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--secondary),var(--primary));
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

/* ===== Helpers ===== */
.hidden {
  display: none !important; /* ✅ FORCE HIDE OTP INITIALLY */
}

.error{
  color:#fca5a5;
  font-size:13px;
  margin:-8px 0 12px 4px;
  display:none;
}

.resend{
  font-size:13px;
  color:#c4b5fd;
  cursor:pointer;
  margin-bottom:16px;
  display:none;
}
.resend.disabled{
  opacity:.5;
  pointer-events:none;
}
.otp-box{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:14px;
}

.otp-input{
  width:48px;
  height:52px;
  text-align:center;
  font-size:20px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);
  color:#fff;
}
</style>
</head>

<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>

<div class="card">

  <span class="back" onclick="handleBack()">← Back</span>

  <h2 id="title">Login with OTP</h2>

  <!-- PHONE / EMAIL -->
  <input
    id="identifier"
    placeholder="Enter phone number or email"
  >

  <p class="error" id="userError">User not found. Please register.</p>

  <!-- ✅ OTP - FORCED HIDDEN INITIALLY -->
  <div id="otpBox" class="otp-box hidden">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
  </div>

  <p class="error" id="otpError">Invalid OTP. Please try again.</p>

  <p class="resend" id="resendOtp" onclick="resendOtp()">Resend OTP</p>

  <button id="actionBtn" onclick="sendOtp()">Send OTP</button>

</div>

<script>
const identifier=document.getElementById("identifier");
const userError=document.getElementById("userError");
const otpError=document.getElementById("otpError");
const title=document.getElementById("title");
const actionBtn=document.getElementById("actionBtn");

let otpStage = false;

// ✅ ENSURE OTP HIDDEN ON LOAD
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('otpBox').classList.add('hidden');
});

function sendOtp(){
  const id = identifier.value.trim();
  if(!id) return;

  actionBtn.disabled = true;
  actionBtn.innerText = "Sending...";
  userError.style.display="none";

  fetch("/api/send-otp/",{
    method:"POST",
    credentials: "same-origin",
    headers:{
      "Content-Type":"application/json",
      "X-CSRFToken":"{{ csrf_token }}"
    },
    body:JSON.stringify({identifier:id})
  })
  .then(async res => {
    const isJson = res.headers.get('content-type')?.includes('application/json');
    const data = isJson ? await res.json() : null;
    if (!res.ok) throw { data, status: res.status };
    return data;
  })
  .then(data=>{
    actionBtn.disabled = false;
    otpStage = true;
    userError.style.display="none";

    title.innerHTML = `
      OTP SENT TO ${id}
      <span class="change" onclick="handleBack()">Change?</span>
    `;
    identifier.style.display = "none";
    setTimeout(() => {
      const otpBox = document.getElementById("otpBox");
      otpBox.classList.remove("hidden");
      otpInputs[0].focus();
    }, 300);
    
    resendOtpEl.style.display="block";
    actionBtn.innerText="Verify OTP";
    actionBtn.onclick = verifyOtp;
  })
  .catch(err => {
    actionBtn.disabled = false;
    actionBtn.innerText = "Send OTP";
    console.error("Login OTP error:", err);
    if(err.status === 404){
      userError.innerText = "User not found. Please register.";
      userError.style.display="block";
    } else if (err.status === 403) {
      alert("Security Error (CSRF). Please refresh the page.");
    } else {
      alert("Error sending OTP. Please try again later.");
    }
  });
}

function verifyOtp(){
  otpError.style.display="none";
  actionBtn.disabled=true;
  actionBtn.innerText="Verifying...";

  fetch("/api/verify-otp/",{
    method:"POST",
    credentials: "same-origin",
    headers:{
      "Content-Type":"application/json",
      "X-CSRFToken":"{{ csrf_token }}"
    },
    body:JSON.stringify({
      identifier:identifier.value,
      otp: Array.from(otpInputs).map(i => i.value).join("")
    })
  })
  .then(res=>{
    if(res.ok){
      actionBtn.innerText="Logging in...";
      setTimeout(()=>location.href="/mainPage/",1000);
    }else{
      actionBtn.disabled=false;
      actionBtn.innerText="Verify OTP";
      otpError.style.display="block";
    }
  });
}

let resendTimer = null;
let resendSeconds = 10;

function resendOtp(){
  if (resendTimer) return;

  sendOtp();

  resendOtpEl.classList.add("disabled");
  resendSeconds = 10;
  resendOtpEl.innerText = `Resend OTP in ${resendSeconds}s`;

  resendTimer = setInterval(() => {
    resendSeconds--;

    if (resendSeconds > 0) {
      resendOtpEl.innerText = `Resend OTP in ${resendSeconds}s`;
    } else {
      clearInterval(resendTimer);
      resendTimer = null;
      resendOtpEl.innerText = "Resend OTP";
      resendOtpEl.classList.remove("disabled");
    }
  }, 1000);
}

function handleBack(){
  if(!otpStage){
    location.href="/login/";
  }else{
    otpStage = false;

    title.innerText = "Login with OTP";
    identifier.style.display = "block";
    
    // ✅ FORCE HIDE OTP
    const otpBox = document.getElementById("otpBox");
    otpBox.classList.add("hidden");
    
    otpInputs.forEach(i => i.value = "");

    otpError.style.display = "none";
    resendOtpEl.style.display = "none";

    actionBtn.innerText = "Send OTP";
    actionBtn.disabled = false;
    actionBtn.onclick = sendOtp;
  }
}

const resendOtpEl = document.getElementById("resendOtp");
const otpInputs = document.querySelectorAll(".otp-input");

otpInputs.forEach((input, index) => {
  input.addEventListener("input", (e) => {
    const value = e.target.value.replace(/[^0-9]/g, "");
    e.target.value = value;

    if (value && index < otpInputs.length - 1) {
      otpInputs[index + 1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && index > 0) {
      otpInputs[index - 1].focus();
    }
  });

  input.addEventListener("paste", (e) => {
    e.preventDefault();
    const pasted = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
    pasted.split("").forEach((digit, i) => {
      if (otpInputs[i]) otpInputs[i].value = digit;
    });
    otpInputs[Math.min(pasted.length, 6) - 1]?.focus();
  });
});
</script>

</body>
</html>
