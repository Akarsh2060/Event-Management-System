{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zevents | Verify OTP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="/static/images/zevntt.png">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#a855f7;
  --secondary:#7c3aed;
  --dark:#070411;
  --white:#ffffff;
  --glass:rgba(255,255,255,0.08);
}

/* Reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

a{
  text-decoration:none;
  color:inherit;
}

/* Body */
html, body{
  height:100%;
}

body{
  background:
    radial-gradient(circle at top left,#3b1b6f,transparent 50%),
    radial-gradient(circle at bottom right,#1b0f3a,transparent 50%),
    var(--dark);
  color:var(--white);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ================= FLOATING BUBBLES ================= */
.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(168,85,247,0.18);
  opacity:.7;
  animation:drift linear infinite;
}

.b1{
  width:240px;
  height:240px;
  left:-300px;
  top:12%;
  animation-duration:34s;
}

.b2{
  width:160px;
  height:160px;
  left:-220px;
  top:55%;
  animation-duration:28s;
}

.b3{
  width:210px;
  height:210px;
  left:-260px;
  bottom:12%;
  animation-duration:40s;
}

@keyframes drift{
  from{
    transform:translateX(0) translateY(0);
  }
  to{
    transform:translateX(160vw) translateY(-90px);
  }
}

/* ================= BACK BUTTON ================= */
.back-btn{
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  color:#c4b5fd;
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.08);
  transition:.2s ease;
  z-index:2;
}

.back-btn:hover{
  background:rgba(0,0,0,0.65);
  color:#fff;
}

/* ================= VERIFY OTP CARD ================= */
.verify-box{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  padding:42px 38px;
  border-radius:22px;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,0.06),
    rgba(255,255,255,0.02)
  );
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

.verify-box h1{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  color:#f1f5f9;
}

/* Inputs */
.form-group{
  margin-bottom:18px;
}

label{
  font-size:11px;
  letter-spacing:.08em;
  color:#c4b5fd;
  text-transform:uppercase;
  margin-bottom:6px;
  display:block;
}

input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.12);
  color:#f8fafc;
  font-size:14px;
  transition:.25s ease;
}

input::placeholder{
  color:rgba(255,255,255,0.5);
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(168,85,247,0.25);
  background:rgba(0,0,0,0.5);
}

/* Button */
button{
  width:100%;
  margin-top:8px;
  padding:12px 0;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--secondary),var(--primary));
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 15px 35px rgba(168,85,247,0.45);
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 20px 45px rgba(168,85,247,0.6);
}

/* Footer */
.footer-text{
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:#c7d2fe;
}

.footer-text a{
  color:var(--primary);
  font-weight:500;
}

/* Responsive */
@media(max-width:480px){
  .verify-box{
    margin:20px;
  }
}
</style>
</head>

<body>

<!-- Floating bubbles -->
<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>

<a href="/register/" class="back-btn">← Back</a>

<form method="POST" class="verify-box" action="{% url 'verify_otp' %}">
  {% csrf_token %}

  <h1>Verify OTP</h1>

  {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  <div class="form-group">
    <label>Enter OTP</label>
    <input
      type="text"
      name="otp"
      maxlength="6"
      placeholder="6-digit OTP"
      required
    >
  </div>

  <button type="submit">Verify OTP</button>

  <div class="footer-text">
    Didn't receive OTP?
    <a href="{% url 'resend_otp' %}">Resend OTP</a>
  </div>
</form>

</body>
</html>
